services:
  db:
    image: postgres:16-alpine
    container_name: flowboard-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: flowboard
      POSTGRES_PASSWORD: ${DB_PASSWORD:-flowboard}
      POSTGRES_DB: flowboard
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowboard -d flowboard"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowboard-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://flowboard:${DB_PASSWORD:-flowboard}@db:5432/flowboard?schema=public
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: flowboard-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

volumes:
  db-data:
